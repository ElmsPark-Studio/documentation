<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="A short, interactive lesson on building your first PageMotor plugin: one folder, one class, one working shortcode. One step at a time.">
<title>Your first PageMotor plugin, the interactive lesson | ElmsPark</title>
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=fraunces:400,600|inter-tight:400,500,600,700&display=swap">
<style>
  :root{
    --paper:#f4efe4; --card:#fffdf8; --ink:#23211c; --soft:#6b6456;
    --pine:#2f5d4a; --pine-deep:#234a3b; --line:#e4ddcd; --accent:#c97a3c;
    --good:#2f7a54; --good-bg:#e3f3ea; --good-line:#9ccdb2;
    --dim:#efe9da; --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter Tight',system-ui,-apple-system,"Segoe UI",sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100dvh}
  .bar{display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:14px 20px; font-size:14px}
  .brand{color:var(--pine-deep); text-decoration:none; font-weight:600; letter-spacing:.01em}
  .brand b{font-weight:700}
  .brand .dot{color:var(--soft); font-weight:500; margin:0 6px}
  .exit{color:var(--soft); text-decoration:none; font-weight:500; border-bottom:1px solid transparent}
  .exit:hover,.exit:focus-visible{color:var(--pine); border-bottom-color:var(--pine)}
  .progress{height:5px; background:var(--dim); margin:0 20px; border-radius:999px; overflow:hidden}
  .progress-fill{height:100%; width:0; background:var(--pine); border-radius:999px; transition:width .35s cubic-bezier(.4,0,.2,1)}
  @media (prefers-reduced-motion: reduce){ .progress-fill{transition:none} }
  .stage{flex:1; display:flex; flex-direction:column; justify-content:center;
    width:100%; max-width:600px; margin:0 auto; padding:18px 22px 8px}
  .count{font-size:13px; color:var(--soft); font-weight:500; letter-spacing:.04em; margin:0 0 18px}
  .step{animation:fade .3s ease both}
  @media (prefers-reduced-motion: reduce){ .step{animation:none} }
  @keyframes fade{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  .icon{font-size:42px; line-height:1; margin:0 0 14px}
  h1.h{font-family:Fraunces,Georgia,serif; font-weight:600; font-size:clamp(26px,6vw,34px);
    line-height:1.15; color:var(--pine-deep); margin:0 0 14px; letter-spacing:-.01em}
  .lead{font-size:clamp(17px,4.4vw,19px); color:var(--ink); margin:0 0 8px}
  .sub{font-size:16px; color:var(--soft); margin:10px 0 0}
  .rec{display:inline-block; margin-top:16px; font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:14px; background:#1f1d17; color:#e8e2d0; padding:9px 14px; border-radius:10px; letter-spacing:.01em}
  .opts{display:flex; flex-direction:column; gap:10px; margin:20px 0 0}
  .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:left; font:inherit; font-size:16.5px;
    background:var(--card); border:1.5px solid var(--line); color:var(--ink); padding:15px 16px; border-radius:14px;
    cursor:pointer; transition:border-color .15s, background .15s, transform .1s}
  .opt:hover:not(:disabled){border-color:var(--pine); transform:translateY(-1px)}
  .opt:focus-visible{outline:2px solid var(--pine); outline-offset:2px}
  .opt .key{flex:none; width:24px; height:24px; border-radius:7px; background:var(--dim); color:var(--soft);
    display:grid; place-items:center; font-size:13px; font-weight:700}
  .opt[data-state="correct"]{border-color:var(--good-line); background:var(--good-bg)}
  .opt[data-state="correct"] .key{background:var(--good); color:#fff}
  .opt[data-state="wrong"]{border-color:#e7c3b6; background:#fbf0ec; color:var(--soft)}
  .opt[data-state="wrong"] .key{background:#d98c70; color:#fff}
  .opt[disabled]{cursor:default}
  .why{margin:16px 0 0; padding:13px 16px; border-radius:12px; font-size:16px;
    background:var(--good-bg); border:1px solid var(--good-line); color:#1d5236; display:none}
  .why.show{display:block; animation:fade .25s ease both}
  .why b{color:var(--good)}
  .win-list{list-style:none; padding:0; margin:18px 0 0}
  .win-list li{display:flex; gap:11px; align-items:flex-start; font-size:17px; margin:11px 0}
  .win-list li::before{content:"\2713"; color:var(--good); font-weight:700; flex:none}
  .nav{display:flex; gap:12px; align-items:center; justify-content:space-between;
    width:100%; max-width:600px; margin:0 auto; padding:14px 22px calc(14px + env(safe-area-inset-bottom))}
  .btn{font:inherit; font-weight:600; font-size:16px; cursor:pointer; border-radius:12px; padding:13px 24px;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink); transition:.15s}
  .btn:hover:not(:disabled){border-color:var(--pine)}
  .btn:focus-visible{outline:2px solid var(--pine); outline-offset:2px}
  .btn.primary{background:var(--pine); border-color:var(--pine); color:#fff; flex:1; max-width:none}
  .btn.primary:hover:not(:disabled){background:var(--pine-deep)}
  .btn.ghost{background:transparent; border-color:transparent; color:var(--soft)}
  .btn:disabled{opacity:.4; cursor:default}
  .winbtns{display:flex; flex-direction:column; gap:10px; margin:26px 0 0}
  .winbtns a{display:block; text-align:center; text-decoration:none}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  @media(min-width:520px){ .winbtns{flex-direction:row} .winbtns a{flex:1} }
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="/learn/">Elms<b>Park</b><span class="dot">&middot;</span>Lessons</a>
    <a class="exit" href="/guides/first-pagemotor-plugin/">Full guide &rarr;</a>
  </div>
  <div class="progress" aria-hidden="true"><div class="progress-fill" id="pfill"></div></div>

  <main class="stage" id="stage" aria-live="polite"></main>

  <nav class="nav" aria-label="Lesson navigation">
    <button class="btn ghost" id="back" type="button">&larr; Back</button>
    <button class="btn primary" id="next" type="button">Start &rarr;</button>
  </nav>

<script>
(function(){
  var STEPS = [
    { type:'intro', icon:'\u{1F9E9}', h:'Your first PageMotor plugin',
      lead:'One folder, one PHP file, one working shortcode. Ten quick taps and you will know how a PageMotor plugin is built.' },

    { type:'concept', icon:'\u{1F4C1}', h:'A plugin is one folder',
      lead:'It is a folder with a <code>plugin.php</code> inside it.',
      sub:'That file declares a class that extends <code>PM_Plugin</code>, the framework&rsquo;s base class.' },

    { type:'concept', icon:'\u{1F9F1}', h:'You opt into capabilities',
      lead:'You add features by implementing valet methods on your class.',
      sub:'A valet is a named method PageMotor calls at the right moment, for example <code>shortcodes()</code>.' },

    { type:'concept', icon:'\u{1F516}', h:'shortcodes() maps a tag',
      lead:'It returns an array mapping a shortcode tag to a handler method.',
      sub:'The handler receives an <code>$args</code> array and returns HTML, it never echoes.',
      rec:"return ['hello-world' => 'render_hello'];" },

    { type:'question', icon:'\u{1F50D}', h:'Did uploading run it?',
      lead:'You copied the plugin folder onto the server. Is the plugin running yet?',
      opts:['Yes, the folder is in place','No, you still have to install and activate it'],
      answer:1,
      why:'<b>No.</b> Uploading is not enough. Install it, then activate it in the admin Plugins section before it does anything.' },

    { type:'concept', icon:'\u{1F3A8}', h:'A shortcode&rsquo;s CSS',
      lead:'Load shortcode styles with <code>css_sitewide()</code>, not <code>css()</code>.',
      sub:'<code>css()</code> only fires when the plugin is placed in the current template, so a shortcode would go unstyled.' },

    { type:'question', icon:'\u{1F50E}', h:'Which loads the CSS?',
      lead:'A shortcode can appear on any page. Which method loads its CSS so it is always there?',
      opts:['css()','css_sitewide()'],
      answer:1,
      why:'<b>css_sitewide().</b> <code>css()</code> only loads when the plugin is placed in the template, but a shortcode can be anywhere, so it needs sitewide CSS.' },

    { type:'concept', icon:'⚠️', h:'A fatal takes the site down',
      lead:'PageMotor includes <code>plugin.php</code> directly on every page load.',
      sub:'A syntax error or uncaught fatal stops every page until the file is fixed or the plugin is removed.' },

    { type:'question', icon:'\u{1F4A5}', h:'What does a syntax error hit?',
      lead:'You leave a stray bracket in <code>plugin.php</code>. What breaks?',
      opts:['Only that one plugin&rsquo;s output','The whole site, since PageMotor includes the file directly','Nothing, it is caught quietly'],
      answer:1,
      why:'<b>The whole site.</b> The file is included directly, so a parse error stops every page. Keep early plugins simple and test each change.' },

    { type:'win', icon:'✅', h:'You have got it',
      items:['One folder, one class extending <code>PM_Plugin</code>.','Opt into capabilities with valet methods like <code>shortcodes()</code>.','A handler returns HTML, it never echoes.','Install and activate it, uploading alone does nothing.','Use <code>css_sitewide()</code> for shortcode CSS, never <code>css()</code>.','A fatal in plugin.php takes the whole site down, so keep early plugins simple.'],
      guide:'/guides/first-pagemotor-plugin/' }
  ];

  var i = 0, answered = {};
  var stage = document.getElementById('stage');
  var pfill = document.getElementById('pfill');
  var back = document.getElementById('back');
  var next = document.getElementById('next');
  var KEYS = ['A','B','C','D'];

  function esc(t){ return t; }

  function render(){
    var s = STEPS[i];
    pfill.style.width = (i/(STEPS.length-1))*100 + '%';
    var h = '<div class="step">';
    if(s.type !== 'win') h += '<p class="count">Step ' + (i+1) + ' of ' + STEPS.length + '</p>';
    h += '<div class="icon" aria-hidden="true">' + s.icon + '</div>';
    h += '<h1 class="h">' + s.h + '</h1>';
    if(s.lead) h += '<p class="lead">' + s.lead + '</p>';
    if(s.sub) h += '<p class="sub">' + s.sub + '</p>';
    if(s.rec) h += '<div class="rec">' + s.rec + '</div>';
    if(s.type === 'question'){
      h += '<div class="opts" role="group" aria-label="Answer">';
      for(var o=0;o<s.opts.length;o++){
        h += '<button class="opt" type="button" data-opt="'+o+'"><span class="key" aria-hidden="true">'+KEYS[o]+'</span><span>'+s.opts[o]+'</span></button>';
      }
      h += '</div>';
      h += '<p class="why" id="why">'+s.why+'</p>';
    }
    if(s.type === 'win'){
      h += '<ul class="win-list">';
      for(var w=0;w<s.items.length;w++) h += '<li>'+s.items[w]+'</li>';
      h += '</ul>';
      h += '<div class="winbtns">'
         + '<a class="btn primary" href="'+s.guide+'">Read the full guide</a>'
         + '<a class="btn" href="#" id="restart">Start again</a>'
         + '</div>';
    }
    h += '</div>';
    stage.innerHTML = h;

    // wire question options
    if(s.type === 'question'){
      var chosen = answered[i];
      var opts = stage.querySelectorAll('.opt');
      var why = stage.querySelector('#why');
      opts.forEach(function(btn){
        btn.addEventListener('click', function(){ choose(parseInt(btn.dataset.opt,10)); });
      });
      if(chosen !== undefined) paintAnswer(opts, why, s, chosen);
    }
    if(s.type === 'win'){
      var r = stage.querySelector('#restart');
      if(r) r.addEventListener('click', function(e){ e.preventDefault(); i=0; answered={}; render(); });
    }

    // nav state
    back.style.visibility = i===0 ? 'hidden' : 'visible';
    if(s.type === 'win'){ next.style.display='none'; }
    else { next.style.display=''; }
    next.textContent = i===0 ? 'Start →' : 'Next →';
    if(s.type === 'question' && answered[i]===undefined){ next.disabled = true; }
    else { next.disabled = false; }
  }

  function paintAnswer(opts, why, s, chosen){
    opts.forEach(function(btn){
      var o = parseInt(btn.dataset.opt,10);
      btn.disabled = true;
      if(o === s.answer) btn.dataset.state = 'correct';
      else if(o === chosen) btn.dataset.state = 'wrong';
    });
    why.classList.add('show');
    next.disabled = false;
  }

  function choose(o){
    var s = STEPS[i];
    if(answered[i] !== undefined) return;
    answered[i] = o;
    var opts = stage.querySelectorAll('.opt');
    var why = stage.querySelector('#why');
    paintAnswer(opts, why, s, o);
    next.focus();
  }

  function go(d){
    var ni = i + d;
    if(ni < 0 || ni >= STEPS.length) return;
    i = ni; render();
    stage.focus && stage.focus();
  }

  next.addEventListener('click', function(){ go(1); });
  back.addEventListener('click', function(){ go(-1); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight' && !next.disabled && next.style.display!=='none') go(1);
    else if(e.key === 'ArrowLeft' && i>0) go(-1);
    else if(STEPS[i].type==='question' && answered[i]===undefined){
      var n = ['1','2','3','4'].indexOf(e.key);
      if(n>-1 && n<STEPS[i].opts.length) choose(n);
    }
  });

  render();
})();
</script>
</body>
</html>
